---
layout: default
---

<style>
/* Keep your existing styles but add these fixes */
.project-header {
  margin-bottom: 40px;
  border-bottom: 1px solid #eee;
  padding-bottom: 20px;
}
.project-layout {
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
  margin-bottom: 30px; /* Space before the main text starts */
}
.project-image-container {
  flex: 3;
  min-width: 300px;
}
.project-sidebar {
  flex: 1;
  min-width: 200px;
  background: #f8fafc;
  padding: 20px;
  border-radius: 8px;
  height: fit-content;
}

/* Add this for your Python code and paragraphs */
.main-text-content {
  text-align: justify;
  line-height: 1.7;
  width: 100%; /* Ensures it goes below the sidebar */
  clear: both;
}

/* Fix for Python code block styling */
.main-text-content pre {
  padding: 20px;
  background: #1e293b; /* Dark background for code */
  color: #f8fafc;
  border-radius: 8px;
  overflow-x: auto;
}
</style>

<div class="project-header">
  <h1>{{ page.title }}</h1>
  <p style="font-size: 1.2rem; color: #666;">{{ page.description }}</p>
</div>

<div class="project-layout">
  <div class="project-image-container">
    {% if page.image %}
      <img src="{{ page.image }}" alt="{{ page.title }}" style="width:100%; border-radius: 8px;">
    {% endif %}
  </div>

  <div class="project-sidebar">
    {% if page.github_link %}
    <div class="sidebar-section">
      <a href="{{ page.github_link }}" target="_blank" class="btn" style="display:block; width:100%; text-align:center;">
        View Code on GitHub
      </a>
    </div>
    {% endif %}

    <div class="sidebar-section">
      <div class="sidebar-label">Tags</div>
      <div style="margin-top:10px;">
        {% for tool in page.tools %}
          <span class="skill-tag" style="background:white; border: 1px solid #e2e8f0; padding: 2px 8px; border-radius: 4px; margin-right: 5px; display: inline-block;">{{ tool }}</span>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
<script type="text/javascript" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
<div class="main-text-content">
  {{ content }}
</div>
